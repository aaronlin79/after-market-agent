name: Daily Brief

on:
  workflow_dispatch:
  schedule:
    # Primary slot for the 6:00 AM PT delivery window during PDT.
    - cron: "0 13 * * *"
    # Fallback slot for the 6:00 AM PT delivery window during PST.
    - cron: "0 14 * * *"

permissions:
  contents: read

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  daily-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APP_NAME: After Market Agent
      ENVIRONMENT: production
      DATABASE_URL: sqlite:///./after_market_agent_ci.db
      DEBUG: "false"
      DEFAULT_WATCHLIST_NAME: Core Watchlist
      NEWS_PROVIDER: finnhub
      INGESTION_LOOKBACK_HOURS: "24"
      EMAIL_PROVIDER: resend
      DIGEST_TIMEZONE: America/Los_Angeles
      DIGEST_SEND_HOUR: "6"
      ENABLE_SCHEDULER: "false"
      SCHEDULED_WATCHLIST_ID: "1"
      OPENAI_MODEL_SUMMARY: gpt-5-mini
      OPENAI_TIMEOUT_SECONDS: "30"
      OPENAI_MAX_RETRIES: "2"
      OPENAI_MAX_CLUSTERS_PER_RUN: "25"
      OPENAI_MAX_CALLS_PER_RUN: "25"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_FROM_NAME: After Market Agent
      DIGEST_RECIPIENTS: ${{ secrets.DIGEST_RECIPIENTS }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node for npm script wrapper
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Gate scheduled runs to the 5:30-6:30 AM America/Los_Angeles send window
        id: schedule_gate
        shell: bash
        run: |
          utc_now="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          pt_now="$(TZ=America/Los_Angeles date '+%Y-%m-%d %H:%M:%S %Z')"
          pt_hour="$(TZ=America/Los_Angeles date +%H)"
          pt_minute="$(TZ=America/Los_Angeles date +%M)"
          pt_total_minutes="$((10#${pt_hour} * 60 + 10#${pt_minute}))"
          window_start=330
          window_end=390

          echo "Current UTC time: ${utc_now}"
          echo "Current America/Los_Angeles time: ${pt_now}"

          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            if [ "${pt_total_minutes}" -lt "${window_start}" ] || [ "${pt_total_minutes}" -gt "${window_end}" ]; then
              echo "outside_window=true" >> "${GITHUB_OUTPUT}"
              echo "should_run=false" >> "${GITHUB_OUTPUT}"
              echo "Scheduled run is outside the 5:30-6:30 AM PT send window. Skipping."
              exit 0
            fi
            echo "outside_window=false" >> "${GITHUB_OUTPUT}"
            echo "should_run=true" >> "${GITHUB_OUTPUT}"
            echo "Scheduled run is inside the 5:30-6:30 AM PT send window. Continuing."
          else
            echo "outside_window=false" >> "${GITHUB_OUTPUT}"
            echo "should_run=true" >> "${GITHUB_OUTPUT}"
            echo "Manual run detected. Bypassing the time-window gate."
          fi
      - name: Validate required secrets and environment
        if: steps.schedule_gate.outputs.should_run == 'true'
        shell: bash
        run: |
          required_vars=(
            OPENAI_API_KEY
            NEWS_API_KEY
            SEC_USER_AGENT
            RESEND_API_KEY
            EMAIL_FROM
            DIGEST_RECIPIENTS
          )

          missing=()
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              missing+=("${var_name}")
            fi
          done

          if [ "${DIGEST_SEND_HOUR}" != "6" ]; then
            echo "DIGEST_SEND_HOUR must be 6. Current value: ${DIGEST_SEND_HOUR}"
            exit 1
          fi

          if [ "${DIGEST_TIMEZONE}" != "America/Los_Angeles" ]; then
            echo "DIGEST_TIMEZONE must be America/Los_Angeles. Current value: ${DIGEST_TIMEZONE}"
            exit 1
          fi

          if [ "${ENABLE_SCHEDULER}" != "false" ]; then
            echo "ENABLE_SCHEDULER must be false in GitHub Actions."
            exit 1
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required configuration: ${missing[*]}"
            exit 1
          fi

          echo "Environment validation passed."

      - name: Install Python dependencies
        if: steps.schedule_gate.outputs.should_run == 'true'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run database migrations
        if: steps.schedule_gate.outputs.should_run == 'true'
        shell: bash
        run: |
          echo "Running migrations against ${DATABASE_URL}"
          alembic -c alembic.ini upgrade head

      - name: Execute daily brief
        if: steps.schedule_gate.outputs.should_run == 'true'
        shell: bash
        run: |
          echo "Running daily brief with NEWS_PROVIDER=${NEWS_PROVIDER}, EMAIL_PROVIDER=${EMAIL_PROVIDER}, DIGEST_TIMEZONE=${DIGEST_TIMEZONE}, DIGEST_SEND_HOUR=${DIGEST_SEND_HOUR}"
          npm run daily
